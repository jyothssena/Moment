apiVersion: v1
kind: Secret
metadata:
  name: moment-secrets
  namespace: moment
  labels:
    app: moment
  annotations:
    # These values are injected by the CI/CD pipeline using:
    #   kubectl create secret generic moment-secrets \
    #     --from-literal=GEMINI_API_KEY_MOMENT=${{ secrets.GEMINI_API_KEY_MOMENT }} \
    #     --from-literal=SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} \
    #     --namespace=moment \
    #     --dry-run=client -o yaml | kubectl apply -f -
    #
    # NEVER put actual secret values in this file.
    # This file is committed to Git as a template only.
    # The real values live in GitHub Secrets and are injected at deploy time.
type: Opaque
stringData:
  GEMINI_API_KEY_MOMENT: "INJECTED_BY_CICD"
  SLACK_WEBHOOK_URL:     "INJECTED_BY_CICD"
