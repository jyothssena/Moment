apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: moment-api-hpa
  namespace: moment
  labels:
    app: moment-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: moment-api

  # Pod count boundaries
  minReplicas: 2   # Always keep 2 running — ensures HA even with zero traffic
  maxReplicas: 10  # Cap at 10 to control GCP cost during MVP

  metrics:
    # Scale up when average CPU across all pods exceeds 70%
    # Scale down when it drops back below 70% (with cooldown)
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Scale up when average memory exceeds 80%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    # Scale UP fast — respond quickly to traffic spikes
    scaleUp:
      stabilizationWindowSeconds: 30    # wait 30s of sustained load before scaling up
      policies:
        - type: Pods
          value: 2                       # add max 2 pods at a time
          periodSeconds: 60

    # Scale DOWN slow — avoid yo-yo scaling that causes latency spikes
    scaleDown:
      stabilizationWindowSeconds: 300   # wait 5 minutes before scaling down
      policies:
        - type: Pods
          value: 1                       # remove max 1 pod at a time
          periodSeconds: 120             # every 2 minutes
