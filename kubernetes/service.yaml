apiVersion: v1
kind: Service
metadata:
  name: moment-api-service
  namespace: moment
  labels:
    app: moment-api
  annotations:
    # GCP Cloud Load Balancer annotations for production traffic
    cloud.google.com/neg: '{"ingress": true}'   # enables container-native load balancing
                                                  # (faster, healthier than node-based)
spec:
  type: ClusterIP   # Internal only — Ingress handles external traffic
                    # This prevents direct external exposure of pods
  selector:
    app: moment-api  # Routes traffic to all pods with this label

  ports:
    - name: http
      protocol: TCP
      port: 80           # Service listens on port 80
      targetPort: 8080   # Forwards to container port 8080

---
# NodePort service for debugging only (not used in production)
# Lets you reach the API directly via: http://NODE_IP:30080
# Remove this in production if not needed for demos
apiVersion: v1
kind: Service
metadata:
  name: moment-api-nodeport
  namespace: moment
  labels:
    app: moment-api
    purpose: debug
spec:
  type: NodePort
  selector:
    app: moment-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30080   # Fixed port for easy demo access
