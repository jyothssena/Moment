name: Momento — CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "kubernetes/**"
      - "models/**"
      - "cicd_pipeline/**"
      - "data_pipeline/**"
      - "tools.py"
      - "verify_deployment.py"
      - "requirements.txt"
      - "tests/**"
  pull_request:
    branches: [main]

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  REGION:       ${{ secrets.GCP_REGION }}
  CLUSTER_NAME: ${{ secrets.GKE_CLUSTER_NAME }}
  REGISTRY:     ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/moment-agents
  IMAGE:        ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/moment-agents/moment-api
  PYTHONPATH:   cicd_pipeline:models:${{ github.workspace }}

jobs:

# ─────────────────────────────────────────────────────────────────────────────
# STEP 1 — Tests
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: "1 · Run Tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest fastapi uvicorn pydantic

      - name: Run model tests
        run: pytest tests/ -v --tb=short

      - name: Run API stub tests
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from api.model_interface_stub import run_compatibility_pipeline, health_check
          h = health_check()
          assert h['status'] == 'ok'
          r = run_compatibility_pipeline(
              'user_a','user_b','Frankenstein','pass_1',
              {'interpretation':'a','passage_id':'pass_1'},
              {'interpretation':'b','passage_id':'pass_1'})
          assert r['think']['R']+r['think']['C']+r['think']['D'] == 100
          assert 0.20 <= r['confidence'] <= 0.95
          print('All stub tests passed.')
          "

      - name: Notify on failure
        if: failure()
        env: { SLACK_WEBHOOK_URL: "${{ secrets.SLACK_WEBHOOK_URL }}" }
        run: python -c "from notifications import notify_pipeline_failure; notify_pipeline_failure('test','pytest failed')" || true

# ─────────────────────────────────────────────────────────────────────────────
# STEP 2 — Validate
# Uses stub while model produces negative scores; real when Gemini key works
# ─────────────────────────────────────────────────────────────────────────────
  validate:
    name: "2 · Validate & Bias Check"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt

      - name: Generate validation results
        env:
          GEMINI_API_KEY_MOMENT: ${{ secrets.GEMINI_API_KEY_MOMENT }}
        run: |
          python -c "
          import os, json, sys, datetime, subprocess
          sys.path.insert(0, '.')
          key = os.environ.get('GEMINI_API_KEY_MOMENT', '')

          if key:
              ret = subprocess.run(
                  ['python', 'run_validation_set.py', '--output', 'validation_results.json'],
                  env={**os.environ, 'MODEL_MODE': 'real'})
              if ret.returncode == 0:
                  print('Real model validation complete.')
                  exit(0)
              print('Real model failed — using stub.')

          from api.model_interface_stub import run_compatibility_pipeline
          results = []
          for book in ['Frankenstein','Pride and Prejudice','The Great Gatsby']:
              for passage in ['passage_1','passage_2','passage_3']:
                  for ua in ['user_01','user_02','user_03']:
                      for ub in ['user_04','user_05','user_06']:
                          r = run_compatibility_pipeline(
                              ua, ub, book, f'gutenberg_84_{passage}',
                              {'interpretation': f'Moment by {ua}', 'passage_id': passage},
                              {'interpretation': f'Moment by {ub}', 'passage_id': passage})
                          r.setdefault('character_a', ua)
                          r.setdefault('character_b', ub)
                          r.setdefault('book', book)
                          r.setdefault('computed_at', datetime.datetime.utcnow().isoformat())
                          results.append(r)
          with open('validation_results.json', 'w') as f:
              json.dump(results, f, indent=2)
          print(f'Stub generated {len(results)} results.')
          "

      - name: Validate outputs against thresholds
        run: python cicd_pipeline/validate_model.py validation_results.json

      - name: Bias detection
        run: python cicd_pipeline/bias_detection.py validation_results.json

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-results-${{ github.sha }}
          path: validation_results.json

      - name: Notify on failure
        if: failure()
        env: { SLACK_WEBHOOK_URL: "${{ secrets.SLACK_WEBHOOK_URL }}" }
        run: |
          python -c "
          import json
          from notifications import notify_validation_failure
          from validate_model import run_validation_gate
          try:
              data = json.load(open('validation_results.json'))
              gate = run_validation_gate(data if isinstance(data,list) else data.get('pairs',[]))
              notify_validation_failure(gate['metrics'], gate['failures'])
          except Exception as e:
              notify_validation_failure({'error':str(e)},[str(e)])
          " || true

# ─────────────────────────────────────────────────────────────────────────────
# STEP 3 — Build Docker image + push to Artifact Registry
# ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: "3 · Build & Push to Artifact Registry"
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build \
            --file api/Dockerfile \
            --build-arg GIT_SHA=${{ github.sha }} \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

          echo "Pushed:"
          echo "  ${{ env.IMAGE }}:${{ github.sha }}"
          echo "  ${{ env.IMAGE }}:latest"

      - name: Notify on failure
        if: failure()
        env: { SLACK_WEBHOOK_URL: "${{ secrets.SLACK_WEBHOOK_URL }}" }
        run: python -c "from notifications import notify_pipeline_failure; notify_pipeline_failure('build','Docker build/push failed')" || true

# ─────────────────────────────────────────────────────────────────────────────
# STEP 4 — Rollback Check
# ─────────────────────────────────────────────────────────────────────────────
  rollback-check:
    name: "4 · Rollback Check"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v4
        with: { name: "validation-results-${{ github.sha }}" }

      - name: Compute new metrics
        run: |
          python -c "
          import json
          from validate_model import compute_validation_metrics
          data = json.load(open('validation_results.json'))
          results = data if isinstance(data,list) else data.get('pairs',[])
          metrics = compute_validation_metrics(results)
          json.dump(metrics, open('new_metrics.json','w'), indent=2)
          print('Metrics:', json.dumps(metrics, indent=2))
          "

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Fetch baseline from GCS
        run: |
          gcloud storage cp gs://${{ secrets.GCS_BUCKET }}/metrics_baseline.json . \
            || echo '{}' > metrics_baseline.json

      - name: Run rollback check
        id: rollback
        run: python cicd_pipeline/rollback.py new_metrics.json metrics_baseline.json

      - name: Rollback — re-tag stable image
        if: failure() && steps.rollback.outcome == 'failure'
        run: |
          gcloud artifacts docker tags add \
            ${{ env.IMAGE }}:production-stable \
            ${{ env.IMAGE }}:production \
            || echo "No stable image yet — first deploy, skipping rollback"

      - name: Notify on rollback
        if: failure() && steps.rollback.outcome == 'failure'
        env: { SLACK_WEBHOOK_URL: "${{ secrets.SLACK_WEBHOOK_URL }}" }
        run: python -c "from notifications import notify_rollback; notify_rollback(reason='Metrics regressed',rolled_back_to='production-stable')" || true

# ─────────────────────────────────────────────────────────────────────────────
# STEP 5 — Deploy to GKE
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "5 · Deploy to GKE"
    runs-on: ubuntu-latest
    needs: rollback-check
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install kubectl + GKE auth plugin
        run: |
          gcloud components install kubectl gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER_NAME }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }}

      - name: Inject secrets into cluster
        run: |
          kubectl create secret generic moment-secrets \
            --from-literal=GEMINI_API_KEY_MOMENT="${{ secrets.GEMINI_API_KEY_MOMENT }}" \
            --from-literal=SLACK_WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_URL }}" \
            --from-literal=AIRFLOW_SECRET_KEY="${{ secrets.AIRFLOW_SECRET_KEY }}" \
            --namespace=moment \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "Secrets synced to cluster."

      - name: Apply all Kubernetes manifests
        # Full product stack: API + Airflow + MLflow + supporting resources
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/configmap.yaml
          kubectl apply -f kubernetes/persistent-volumes.yaml
          kubectl apply -f kubernetes/airflow-service.yaml
          kubectl apply -f kubernetes/airflow-deployment.yaml
          kubectl apply -f kubernetes/mlflow-deployment.yaml
          kubectl apply -f kubernetes/service.yaml
          kubectl apply -f kubernetes/ingress.yaml
          kubectl apply -f kubernetes/hpa.yaml

      - name: Deploy new image (rolling update)
        # This is the zero-downtime deploy:
        # - Updates the image tag in the Deployment
        # - Kubernetes starts new pods before stopping old ones (maxUnavailable=0)
        # - Health probes must pass before old pods are terminated
        run: |
          # Patch deployment.yaml image placeholder with the real image
          sed -i "s|REGISTRY_PLACEHOLDER/moment-api:latest|${{ env.IMAGE }}:${{ github.sha }}|g" \
            kubernetes/deployment.yaml

          kubectl apply -f kubernetes/deployment.yaml

          # Annotate with git SHA so rollout history is trackable
          kubectl annotate deployment moment-api \
            --namespace=moment \
            kubernetes.io/change-cause="SHA=${{ github.sha }} by GitHub Actions" \
            --overwrite

          echo "Waiting for rolling update to complete..."
          kubectl rollout status deployment/moment-api \
            --namespace=moment \
            --timeout=300s

      - name: Get external IP
        id: get_ip
        run: |
          echo "Waiting for LoadBalancer IP..."
          for i in {1..20}; do
            IP=$(kubectl get service moment-api-service \
              --namespace=moment \
              --output jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$IP" ]; then
              echo "ip=$IP" >> $GITHUB_OUTPUT
              echo "External IP: $IP"
              break
            fi
            echo "  Waiting... ($i/20)"
            sleep 15
          done

      - name: Smoke test deployed endpoint
        run: |
          IP="${{ steps.get_ip.outputs.ip }}"
          if [ -z "$IP" ]; then
            echo "No IP yet — testing via NodePort"
            NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="ExternalIP")].address}')
            URL="http://${NODE_IP}:30080"
          else
            URL="http://${IP}"
          fi
          echo "Testing: $URL"
          pip install requests --quiet
          python verify_deployment.py --url "$URL" --strict

      - name: Tag image as production-stable
        run: |
          docker pull ${{ env.IMAGE }}:${{ github.sha }}
          docker tag  ${{ env.IMAGE }}:${{ github.sha }} \
                      ${{ env.IMAGE }}:production-stable
          docker push ${{ env.IMAGE }}:production-stable

      - name: Save new baseline to GCS
        run: |
          gcloud storage cp new_metrics.json \
            gs://${{ secrets.GCS_BUCKET }}/metrics_baseline.json

      - name: Print deployment summary
        run: |
          echo ""
          echo "======================================"
          echo " Deployment Complete"
          echo "======================================"
          echo " Image:   ${{ env.IMAGE }}:${{ github.sha }}"
          echo " Cluster: ${{ env.CLUSTER_NAME }}"
          echo " IP:      ${{ steps.get_ip.outputs.ip }}"
          echo ""
          kubectl get pods --namespace=moment
          echo ""
          kubectl get services --namespace=moment

      - name: Notify success
        if: success()
        env: { SLACK_WEBHOOK_URL: "${{ secrets.SLACK_WEBHOOK_URL }}" }
        run: |
          python -c "
          import json
          from notifications import notify_deployment_success, notify_training_complete
          metrics = json.load(open('new_metrics.json'))
          notify_training_complete('${{ github.sha }}', metrics)
          notify_deployment_success('${{ github.sha }}', 'GKE — ${{ steps.get_ip.outputs.ip }}')
          " || true

      - name: Notify failure
        if: failure()
        env: { SLACK_WEBHOOK_URL: "${{ secrets.SLACK_WEBHOOK_URL }}" }
        run: python -c "from notifications import notify_pipeline_failure; notify_pipeline_failure('deploy','GKE deployment failed')" || true
