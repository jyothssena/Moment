name: Deploy FastAPI Pipeline to Cloud Run

# Triggers on every push to the fastapi branch
on:
  push:
    branches:
      - fastapi-pipeline

env:
  PROJECT_ID: moment-486719
  REGION:     us-central1
  SERVICE:    moment-api
  IMAGE:      gcr.io/moment-486719/moment-api

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP ──────────────────────────────────────────────
      # Requires GitHub Secret: GCP_SA_KEY (JSON key of the service account)
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Set up Cloud SDK ─────────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # ── 4. Configure Docker to push to GCR ─────────────────────────────────
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      # ── 5. Build Docker image ───────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            ./fastapi_pipeline

      # ── 6. Push image to GCR ────────────────────────────────────────────────
      - name: Push image to Container Registry
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── 7. Deploy to Cloud Run ──────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},BQ_DATASET=new_moments_processed \
            --set-secrets GEMINI_API_KEY_MOMENT=GEMINI_API_KEY_MOMENT:latest,CLOUDSQL_PASS=CLOUDSQL_PASS:latest \
            --add-cloudsql-instances ${{ env.PROJECT_ID }}:${{ env.REGION }}:moment-db \
            --project ${{ env.PROJECT_ID }}

      # ── 8. Print the deployed URL ────────────────────────────────────────────
      - name: Get deployed URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format "value(status.url)")
          echo "Deployed to: $URL"
          echo "Health check: $URL/health"