# MOMENT Data Pipeline - Airflow Docker Compose
# Run from repo root: docker-compose up -d
# Access: http://localhost:8080 (admin/admin)

x-airflow-common: &airflow-common
  build: .
  image: moment-airflow:latest
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    # Tell the DAG where everything is
    SCRIPTS_DIR: /opt/airflow/scripts
    PIPELINE_CONFIG: /opt/airflow/config/config.yaml
    PREPROCESSING_CONFIG: /opt/airflow/config/preprocessing_config.yaml
    REPO_ROOT: /opt/airflow/repo
    # GCS credentials — service account key
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcs-key.json
    GOOGLE_CLOUD_PROJECT: moment-486719
    GEMINI_API_KEY_MOMENT: ${GEMINI_API_KEY_MOMENT}
    PYTHONPATH: /opt/airflow:/opt/airflow/models
  volumes:
    # DAG file
    - ./data_pipeline/airflow/dags:/opt/airflow/dags
    # Scripts (so DAG can import them)
    - ./data_pipeline/scripts:/opt/airflow/scripts
    # Config files
    - ./data_pipeline/config:/opt/airflow/config
    # Data directory (raw + processed)
    - ./data:/opt/airflow/repo/data
    # Also mount data at expected relative paths for bias_detection.py
    - ./data:/opt/airflow/data
    # Tests
    - ./data_pipeline/tests:/opt/airflow/tests
    # Requirements
    - ./requirements.txt:/opt/airflow/requirements.txt
    # GCS service account key — place your key as gcs-service-account.json in repo root
    - ./gcs-service-account.json:/opt/airflow/gcs-key.json:ro
    - ./models:/opt/airflow/models
    - ./tools.py:/opt/airflow/tools.py 
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
      platform: linux/amd64
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
        pip install --no-cache-dir -r /opt/airflow/requirements.txt 2>/dev/null || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: >
      bash -c "rm -f /opt/airflow/airflow-webserver.pid &&
               pip install --no-cache-dir -r /opt/airflow/requirements.txt 2>/dev/null || true &&
               airflow webserver"
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: >
      bash -c "rm -f /opt/airflow/airflow-webserver.pid &&
               pip install --no-cache-dir -r /opt/airflow/requirements.txt 2>/dev/null || true &&
               airflow scheduler"
    restart: always

  cloud-sql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
    command:
     - "--address=0.0.0.0"
     - "--port=5432"
     - "moment-486719:us-central1:moment-db"
    volumes:
     - ./credentials/gcs-serive-account.json:/key.json
    environment:
     GOOGLE_APPLICATION_CREDENTIALS: /key.json
    networks:
      - monitoring

  # ── FastAPI ML Pipeline ──────────────────────────────────────────────────────
  moment-api:
    build:
      context: ./fastapi_pipeline
      dockerfile: Dockerfile
    container_name: moment-api
    ports:
      - "8082:8080"   # host:8082 → container:8080 (8080 already taken by Airflow)
    environment:
      # GCP auth via Application Default Credentials (no key file needed).
      # Run once locally: gcloud auth application-default login
      GOOGLE_CLOUD_PROJECT: moment-486719
      BQ_DATASET: new_moments_processed
      GEMINI_API_KEY_MOMENT: ${GEMINI_API_KEY_MOMENT}
      INSTANCE_CONNECTION_NAME: moment-486719:us-central1:moment-db
      CLOUDSQL_DB:   momento
      CLOUDSQL_USER: momento_admin
      CLOUDSQL_PASS: ${CLOUDSQL_PASS}
    volumes:
      # Mount local gcloud ADC so the container authenticates the same way you do locally.
      # Windows path — Docker Desktop translates this automatically.
      - ${APPDATA}/gcloud:/root/.config/gcloud:ro
    depends_on:
      - cloud-sql-proxy
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Grafana (local dev) ───────────────────────────────────────────────────────
  # In production Grafana runs on Cloud Run and connects to Google Cloud Monitoring.
  # Locally it also uses GCM — ADC credentials are mounted from the host.
  grafana:
    image: grafana/grafana:10.4.0
    container_name: moment-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: moment123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/moment_pipeline.json
      # Install the Google Cloud Monitoring datasource plugin at startup.
      GF_INSTALL_PLUGINS: grafana-googlecloud-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Mount ADC so Grafana can authenticate to Cloud Monitoring locally.
      - ${APPDATA}/gcloud:/root/.config/gcloud:ro
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  monitoring:
    driver: bridge

volumes:
  postgres-db:
  grafana-data:

